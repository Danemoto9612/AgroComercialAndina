<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title th:text="${pago.idPago != null ? 'Editar Pago' : 'Registrar Pago'}">Pago</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" th:href="@{/estilo.css}">
    </head>
    <body>
        <nav class="sidebar">
            <a th:href="@{/}"><img src="/logo.jpg" alt="Logo" class="logoportada"/></a>
            <div class="sidebar-header"><h3>AgroComercial Andina</h3></div>
            <ul class="nav-links">
                <li><a th:href="@{/}">🏠 Inicio</a></li>
                <li><a th:href="@{/clientes}">👥 Clientes</a></li>
                <li><a th:href="@{/productos}">🌾 Productos</a></li>
                <li><a th:href="@{/pedidos}">📦 Pedidos</a></li>
                <li><a th:href="@{/pagos}" class="active">💳 Pagos</a></li>
                <li><a th:href="@{/facturas}">🧾 Facturación</a></li>
                <li><a th:href="@{/email}">✉️ Correos</a></li>
                <li><a th:href="@{/informes}">📊 Informes</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" style="padding:1rem 1.2rem 1.2rem;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="width:100%;padding:.65rem;background:rgba(181,137,10,0.15);color:#f6c94e;border:1.5px solid rgba(181,137,10,0.4);border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s;" onmouseover="this.style.background='rgba(181,137,10,0.3)'" onmouseout="this.style.background='rgba(181,137,10,0.15)'">🚪 Cerrar Sesión</button>
            </form>
        </nav>
        <main class="main-content">
            <header><h1 th:text="${pago.idPago != null ? 'Editar Pago' : 'Registrar Pago'}"></h1></header>
            <section class="card">
                <form th:action="@{/guardar/pago}" method="post">
                    <!-- ID oculto para edición -->
                    <input type="hidden" name="idPago" th:value="${pago.idPago}">

                    <div class="form-group">
                        <label>Cliente:</label>
                        <select name="clienteId">
                            <option value="">-- Seleccione un cliente --</option>
                            <option th:each="c : ${clientes}"
                                    th:value="${c.idCliente}"
                                    th:text="${c.nombreCliente}"
                                    th:selected="${pago.cliente != null and pago.cliente.idCliente == c.idCliente}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tipo de pago:</label>
                        <select name="tipoPago">
                            <option value="">-- Seleccione tipo --</option>
                            <option value="Efectivo"         th:selected="${pago.tipoPago == 'Efectivo'}">Efectivo</option>
                            <option value="Transferencia"    th:selected="${pago.tipoPago == 'Transferencia'}">Transferencia bancaria</option>
                            <option value="Cheque"           th:selected="${pago.tipoPago == 'Cheque'}">Cheque</option>
                            <option value="Tarjeta crédito"  th:selected="${pago.tipoPago == 'Tarjeta crédito'}">Tarjeta de crédito</option>
                            <option value="Tarjeta débito"   th:selected="${pago.tipoPago == 'Tarjeta débito'}">Tarjeta de débito</option>
                            <option value="Nequi"            th:selected="${pago.tipoPago == 'Nequi'}">Nequi</option>
                            <option value="Daviplata"        th:selected="${pago.tipoPago == 'Daviplata'}">Daviplata</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Monto ($):</label>
                        <input type="number" step="0.01" name="montoPago"
                               th:value="${pago.montoPago}" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha del pago:</label>
                        <input type="date" name="fechaPago" th:value="${pago.fechaPago}" required>
                    </div>
                    <div class="form-group">
                        <label>Estado del pago:</label>
                        <select name="estadoPago">
                            <option value="">-- Seleccione estado --</option>
                            <option value="Pendiente"   th:selected="${pago.estadoPago == 'Pendiente'}">Pendiente</option>
                            <option value="Completado"  th:selected="${pago.estadoPago == 'Completado'}">Completado</option>
                            <option value="Anulado"     th:selected="${pago.estadoPago == 'Anulado'}">Anulado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Referencia / Número de comprobante:</label>
                        <input type="text" name="referencia"
                               th:value="${pago.referencia}"
                               placeholder="Número de transacción o referencia">
                    </div>
                    <div style="display:flex;gap:1rem;margin-top:1rem;">
                        <button type="submit" class="btn-submit"
                                th:text="${pago.idPago != null ? 'Actualizar Pago' : 'Registrar Pago'}"></button>
                        <a th:href="@{/pagos}" class="btn-secondary" style="padding:.9rem 1.6rem;text-decoration:none;">Cancelar</a>
                    </div>
                </form>
            </section>
        </main>
    </body>
</html>
