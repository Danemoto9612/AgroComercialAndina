<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <title>Crear Factura</title>
        <link rel="stylesheet" th:href="@{/estilo.css}">
        <style>
            .factura-tabla {
                width:100%;
                border-collapse:collapse;
                margin-top:1rem;
            }
            .factura-tabla th, .factura-tabla td {
                padding:8px;
                border:1px solid #d0ddd0;
                text-align:left;
            }
            .factura-tabla thead tr {
                background:var(--verde-oscuro);
                color:white;
            }
            .factura-tabla input {
                width:100%;
                padding:6px;
                border:1px solid #ccc;
                border-radius:4px;
            }
            .totales-box {
                margin-top:1rem;
                padding:1rem;
                background:var(--verde-suave);
                border-radius:8px;
                text-align:right;
            }
            .totales-box div {
                margin:.3rem 0;
                font-size:1rem;
            }
            .totales-box .total-final {
                font-size:1.3rem;
                font-weight:700;
                color:var(--verde-oscuro);
            }
        </style>
    </head>
    <body>
        <nav class="sidebar">
            <a th:href="@{/}"><img src="/logo.jpg" alt="Logo" class="logoportada"/></a>
            <div class="sidebar-header"><h3>AgroComercial Andina</h3></div>
            <ul class="nav-links">
                <li><a th:href="@{/}">🏠 Inicio</a></li>
                <li><a th:href="@{/clientes}">👥 Clientes</a></li>
                <li><a th:href="@{/productos}">🌾 Productos</a></li>
                <li><a th:href="@{/pedidos}">📦 Pedidos</a></li>
                <li><a th:href="@{/pagos}">💳 Pagos</a></li>
                <li><a th:href="@{/facturas}" class="active">🧾 Facturación</a></li>
                <li><a th:href="@{/email}">✉️ Correos</a></li>
                <li><a th:href="@{/informes}">📊 Informes</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" style="padding:1rem 1.2rem 1.2rem;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="width:100%;padding:.65rem;background:rgba(181,137,10,0.15);color:#f6c94e;border:1.5px solid rgba(181,137,10,0.4);border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s;" onmouseover="this.style.background='rgba(181,137,10,0.3)'" onmouseout="this.style.background='rgba(181,137,10,0.15)'">🚪 Cerrar Sesión</button>
            </form>
        </nav>
        <main class="main-content">
            <header><h1>Crear Nueva Factura</h1></header>
            <section class="card">
                <div th:if="${resultado}" class="alert alert-success" th:text="${resultado}"></div>
                <form th:action="@{/save}" method="post" id="frmFactura">
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem;">
                        <div class="form-group">
                            <label>Código de factura:</label>
                            <input type="text" name="codigo" placeholder="Ej: FAC-001" required/>
                        </div>
                        <div class="form-group">
                            <label>Cliente:</label>
                            <input type="text" name="cliente" placeholder="Nombre del cliente" required/>
                        </div>
                        <div class="form-group">
                            <label>Fecha:</label>
                            <input type="date" name="fecha"/>
                        </div>
                    </div>

                    <h3 style="color:var(--verde-oscuro);margin-bottom:.5rem;">Productos / Ítems</h3>
                    <table class="factura-tabla" id="itemsTable">
                        <thead><tr>
                                <th style="width:40%">Producto</th>
                                <th style="width:15%">Cantidad</th>
                                <th style="width:20%">Precio Unit.</th>
                                <th style="width:15%">Subtotal</th>
                                <th style="width:10%"></th>
                            </tr></thead>
                        <tbody>
                            <tr>
                                <td><input type="text" name="producto" placeholder="Nombre del producto"/></td>
                                <td><input type="number" name="cantidad" value="1" min="1" oninput="calcular()"/></td>
                                <td><input type="number" step="0.01" name="precio" value="0" oninput="calcular()"/></td>
                                <td class="sub">0.00</td>
                                <td><button type="button" onclick="eliminarFila(this)"
                                            style="background:#c0392b;color:white;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;">✕</button></td>
                            </tr>
                        </tbody>
                    </table>
                    <button type="button" onclick="agregarFila()"
                            style="margin-top:.5rem;padding:6px 14px;background:var(--verde-claro);color:white;border:none;border-radius:4px;cursor:pointer;">
                        ➕ Agregar producto
                    </button>

                    <div class="totales-box">
                        <div>Subtotal: <strong id="subtotal">$ 0.00</strong></div>
                        <div>IVA (19%): <strong id="iva">$ 0.00</strong></div>
                        <div class="total-final">TOTAL: <span id="total">$ 0.00</span></div>
                    </div>
                    <input type="hidden" name="subtotal" id="hdSub"/>
                    <input type="hidden" name="iva"      id="hdIva"/>
                    <input type="hidden" name="total"    id="hdTotal"/>

                    <div style="display:flex;gap:1rem;margin-top:1.5rem;">
                        <button type="submit" class="btn-submit">💾 Guardar Factura</button>
                        <a th:href="@{/facturas}" class="btn-secondary" style="padding:.9rem 1.6rem;text-decoration:none;">Ver facturas</a>
                    </div>
                </form>
            </section>
        </main>
        <script>
            const IVA = 0.19;
            function calcular() {
            let sub = 0;
            document.querySelectorAll('#itemsTable tbody tr').forEach(r => {
            const q = parseFloat(r.querySelector('[name=cantidad]').value) || 0;
            const p = parseFloat(r.querySelector('[name=precio]').value) || 0;
            const s = q * p;
            r.querySelector('.sub').textContent = s.toFixed(2);
            sub += s;
            });
            const iva = sub * IVA;
            const tot = sub + iva;
            document.getElementById('subtotal').textContent = '$ ' + sub.toFixed(2);
            document.getElementById('iva').textContent      = '$ ' + iva.toFixed(2);
            document.getElementById('total').textContent    = '$ ' + tot.toFixed(2);
            document.getElementById('hdSub').value   = sub.toFixed(2);
            document.getElementById('hdIva').value   = iva.toFixed(2);
            document.getElementById('hdTotal').value = tot.toFixed(2);
            }
            function agregarFila() {
            const tbody = document.querySelector('#itemsTable tbody');
            const row = document.createElement('tr');
            row.innerHTML = `
            <td><input type="text" name="producto" placeholder="Nombre del producto"/></td>
            <td><input type="number" name="cantidad" value="1" min="1" oninput="calcular()"/></td>
            <td><input type="number" step="0.01" name="precio" value="0" oninput="calcular()"/></td>
            <td class="sub">0.00</td>
            <td><button type="button" onclick="eliminarFila(this)"
            style="background:#c0392b;color:white;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;">✕</button></td>`;
            tbody.appendChild(row);
            }
            function eliminarFila(btn) {
            const rows = document.querySelectorAll('#itemsTable tbody tr');
            if (rows.length > 1) { btn.closest('tr').remove(); calcular(); }
            else alert('Debe haber al menos un producto.');
            }
            document.getElementById('frmFactura').addEventListener('submit', calcular);
            calcular();
        </script>
    </body>
</html>
