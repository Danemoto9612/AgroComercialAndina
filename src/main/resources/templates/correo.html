<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head><meta charset="UTF-8"/><title>Correo</title></head>
    <body style="font-family:Arial,sans-serif;color:#333;margin:0;padding:0;background:#f5f5f5;">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:620px;margin:30px auto;background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.12);">
            <tr style="background:linear-gradient(135deg,#1b4332,#2d6a4f);">
                <td style="padding:24px 28px;">
                    <h2 style="color:white;margin:0;font-size:1.4rem;">AgroComercial Andina</h2>
                    <p style="color:rgba(255,255,255,.75);margin:4px 0 0;font-size:.9rem;">Comercializadora de Productos Agrícolas</p>
                </td>
            </tr>
            <tr>
                <td style="padding:28px;">
                    <p th:text="'Hola ' + ${nombre} + ','">Hola,</p>
                    <div th:utext="${mensaje}" style="line-height:1.7;color:#444;">Contenido del correo.</div>
                    <br/>
                    <p style="color:#555;">Atentamente,<br/><strong style="color:#1b4332;">AgroComercial Andina</strong></p>
                </td>
            </tr>
            <tr style="background:#f9f9f9;">
                <td style="padding:14px 28px;font-size:.8rem;color:#999;border-top:1px solid #eee;">
                    Este correo fue generado automáticamente. Por favor no responda a este mensaje.
                </td>
            </tr>
        </table>
    </body>
</html>
