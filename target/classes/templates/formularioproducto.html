<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${producto.idProducto != null ? 'Editar Producto' : 'Registrar Producto'}">Producto</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>
<body>
<nav class="sidebar">
    <a th:href="@{/}"><img src="/logo.jpg" alt="Logo" class="logoportada"/></a>
    <div class="sidebar-header"><h3>AgroComercial Andina</h3></div>
    <ul class="nav-links">
        <li><a th:href="@{/}">🏠 Inicio</a></li>
        <li><a th:href="@{/clientes}">👥 Clientes</a></li>
        <li><a th:href="@{/productos}" class="active">🌾 Productos</a></li>
        <li><a th:href="@{/pedidos}">📦 Pedidos</a></li>
        <li><a th:href="@{/pagos}">💳 Pagos</a></li>
        <li><a th:href="@{/facturas}">🧾 Facturación</a></li>
        <li><a th:href="@{/email}">✉️ Correos</a></li>
        <li><a th:href="@{/informes}">📊 Informes</a></li>
    </ul>
    <form th:action="@{/logout}" method="post" style="padding:1rem 1.2rem 1.2rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" style="width:100%;padding:.65rem;background:rgba(181,137,10,0.15);color:#f6c94e;border:1.5px solid rgba(181,137,10,0.4);border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s;" onmouseover="this.style.background='rgba(181,137,10,0.3)'" onmouseout="this.style.background='rgba(181,137,10,0.15)'">🚪 Cerrar Sesión</button>
    </form>
</nav>
<main class="main-content">
    <header><h1 th:text="${producto.idProducto != null ? 'Editar Producto' : 'Registrar Producto'}"></h1></header>
    <section class="card">
        <form th:action="@{/guardar/producto}" th:object="${producto}" method="post">
            <input type="hidden" th:field="*{idProducto}">
            <div class="form-group">
                <label>Nombre del producto:</label>
                <input type="text" th:field="*{nombreProducto}" placeholder="Ej: Papa criolla" required>
            </div>
            <div class="form-group">
                <label>Tipo de producto:</label>
                <select th:field="*{tipoProducto}">
                    <option value="">-- Seleccione --</option>
                    <option value="Tubérculo">Tubérculo</option>
                    <option value="Fruta">Fruta</option>
                    <option value="Verdura">Verdura</option>
                    <option value="Cereal">Cereal</option>
                    <option value="Legumbre">Legumbre</option>
                    <option value="Hortaliza">Hortaliza</option>
                    <option value="Aromática">Aromática</option>
                    <option value="Granos">Granos</option>
                    <option value="Lácteos">Lácteos</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Variedad:</label>
                <input type="text" th:field="*{variedadProducto}" placeholder="Ej: Pastusa, Capira...">
            </div>
            <div class="form-group">
                <label>Precio por unidad ($):</label>
                <input type="number" step="0.01" th:field="*{precioProducto}" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Unidad de medida:</label>
                <select th:field="*{unidadMedida}">
                    <option value="">-- Seleccione --</option>
                    <option value="Kilogramo (kg)">Kilogramo (kg)</option>
                    <option value="Tonelada (t)">Tonelada (t)</option>
                    <option value="Bulto (50kg)">Bulto (50kg)</option>
                    <option value="Caja">Caja</option>
                    <option value="Canastilla">Canastilla</option>
                    <option value="Unidad">Unidad</option>
                    <option value="Litro (L)">Litro (L)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Stock disponible:</label>
                <input type="number" th:field="*{stockProducto}" placeholder="0" min="0" required>
            </div>
            <div class="form-group">
                <label>Descripción:</label>
                <textarea th:field="*{descripcion}" rows="3" placeholder="Descripción del producto..."></textarea>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1rem;">
                <button type="submit" class="btn-submit"
                        th:text="${producto.idProducto != null ? 'Actualizar Producto' : 'Registrar Producto'}"></button>
                <a th:href="@{/productos}" class="btn-secondary" style="padding:.9rem 1.6rem;text-decoration:none;">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
