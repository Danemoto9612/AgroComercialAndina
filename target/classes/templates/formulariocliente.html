<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${cliente.idCliente != null ? 'Editar Cliente' : 'Registrar Cliente'}">Cliente</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>
<body>
<nav class="sidebar">
    <a th:href="@{/}"><img src="/logo.jpg" alt="Logo" class="logoportada"/></a>
    <div class="sidebar-header"><h3>AgroComercial Andina</h3></div>
    <ul class="nav-links">
        <li><a th:href="@{/}">🏠 Inicio</a></li>
        <li><a th:href="@{/clientes}" class="active">👥 Clientes</a></li>
        <li><a th:href="@{/productos}">🌾 Productos</a></li>
        <li><a th:href="@{/pedidos}">📦 Pedidos</a></li>
        <li><a th:href="@{/pagos}">💳 Pagos</a></li>
        <li><a th:href="@{/facturas}">🧾 Facturación</a></li>
        <li><a th:href="@{/email}">✉️ Correos</a></li>
        <li><a th:href="@{/informes}">📊 Informes</a></li>
    </ul>
    <form th:action="@{/logout}" method="post" style="padding:1rem 1.2rem 1.2rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" style="width:100%;padding:.65rem;background:rgba(181,137,10,0.15);color:#f6c94e;border:1.5px solid rgba(181,137,10,0.4);border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s;" onmouseover="this.style.background='rgba(181,137,10,0.3)'" onmouseout="this.style.background='rgba(181,137,10,0.15)'">🚪 Cerrar Sesión</button>
    </form>
</nav>
<main class="main-content">
    <header><h1 th:text="${cliente.idCliente != null ? 'Editar Cliente' : 'Registrar Cliente'}"></h1></header>
    <section class="card">
        <form th:action="@{/guardar/cliente}" th:object="${cliente}" method="post">
            <input type="hidden" th:field="*{idCliente}">
            <div class="form-group">
                <label>Nombre completo:</label>
                <input type="text" th:field="*{nombreCliente}" placeholder="Nombre del cliente" required>
            </div>
            <div class="form-group">
                <label>Teléfono / Contacto:</label>
                <input type="text" th:field="*{contactoCliente}" placeholder="Ej: 300 123 4567">
            </div>
            <div class="form-group">
                <label>Correo electrónico:</label>
                <input type="email" th:field="*{emailCliente}" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Ubicación / Ciudad:</label>
                <input type="text" th:field="*{ubicacionCliente}" placeholder="Ciudad o municipio">
            </div>
            <div class="form-group">
                <label>Tipo de cliente:</label>
                <select th:field="*{tipoCliente}">
                    <option value="">-- Seleccione --</option>
                    <option value="Mayorista">Mayorista</option>
                    <option value="Minorista">Minorista</option>
                    <option value="Distribuidor">Distribuidor</option>
                    <option value="Supermercado">Supermercado</option>
                    <option value="Restaurante">Restaurante</option>
                    <option value="Particular">Particular</option>
                </select>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1rem;">
                <button type="submit" class="btn-submit"
                        th:text="${cliente.idCliente != null ? 'Actualizar Cliente' : 'Registrar Cliente'}"></button>
                <a th:href="@{/clientes}" class="btn-secondary" style="padding:.9rem 1.6rem;text-decoration:none;">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
