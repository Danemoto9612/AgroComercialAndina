<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pedido.idPedido != null ? 'Editar Pedido' : 'Registrar Pedido'}">Pedido</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>
<body>
<nav class="sidebar">
    <a th:href="@{/}"><img src="/logo.jpg" alt="Logo" class="logoportada"/></a>
    <div class="sidebar-header"><h3>AgroComercial Andina</h3></div>
    <ul class="nav-links">
        <li><a th:href="@{/}">🏠 Inicio</a></li>
        <li><a th:href="@{/clientes}">👥 Clientes</a></li>
        <li><a th:href="@{/productos}">🌾 Productos</a></li>
        <li><a th:href="@{/pedidos}" class="active">📦 Pedidos</a></li>
        <li><a th:href="@{/pagos}">💳 Pagos</a></li>
        <li><a th:href="@{/facturas}">🧾 Facturación</a></li>
        <li><a th:href="@{/email}">✉️ Correos</a></li>
        <li><a th:href="@{/informes}">📊 Informes</a></li>
    </ul>
    <form th:action="@{/logout}" method="post" style="padding:1rem 1.2rem 1.2rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" style="width:100%;padding:.65rem;background:rgba(181,137,10,0.15);color:#f6c94e;border:1.5px solid rgba(181,137,10,0.4);border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s;" onmouseover="this.style.background='rgba(181,137,10,0.3)'" onmouseout="this.style.background='rgba(181,137,10,0.15)'">🚪 Cerrar Sesión</button>
    </form>
</nav>
<main class="main-content">
    <header><h1 th:text="${pedido.idPedido != null ? 'Editar Pedido' : 'Registrar Pedido'}"></h1></header>
    <section class="card">
        <form th:action="@{/guardar/pedido}" method="post">
            <!-- ID oculto para edición -->
            <input type="hidden" name="idPedido" th:value="${pedido.idPedido}">

            <div class="form-group">
                <label>Cliente:</label>
                <select name="clienteId">
                    <option value="">-- Seleccione un cliente --</option>
                    <option th:each="c : ${clientes}"
                            th:value="${c.idCliente}"
                            th:text="${c.nombreCliente}"
                            th:selected="${pedido.cliente != null and pedido.cliente.idCliente == c.idCliente}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>Estado del pedido:</label>
                <select name="estadoPedido">
                    <option value="">-- Seleccione estado --</option>
                    <option value="Pendiente"   th:selected="${pedido.estadoPedido == 'Pendiente'}">Pendiente</option>
                    <option value="En proceso"  th:selected="${pedido.estadoPedido == 'En proceso'}">En proceso</option>
                    <option value="Entregado"   th:selected="${pedido.estadoPedido == 'Entregado'}">Entregado</option>
                    <option value="Cancelado"   th:selected="${pedido.estadoPedido == 'Cancelado'}">Cancelado</option>
                </select>
            </div>
            <div class="form-group">
                <label>Fecha del pedido:</label>
                <input type="date" name="fechaPedido" th:value="${pedido.fechaPedido}">
            </div>
            <div class="form-group">
                <label>Observaciones:</label>
                <textarea name="observaciones" rows="3"
                          th:text="${pedido.observaciones}"
                          placeholder="Observaciones adicionales..."></textarea>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1rem;">
                <button type="submit" class="btn-submit"
                        th:text="${pedido.idPedido != null ? 'Actualizar Pedido' : 'Registrar Pedido'}"></button>
                <a th:href="@{/pedidos}" class="btn-secondary" style="padding:.9rem 1.6rem;text-decoration:none;">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
